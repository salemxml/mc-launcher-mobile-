name: Build Release APK

  on:
    push:
      branches:
        - main
        - master
    workflow_dispatch:

  jobs:
    build:
      name: Build Release APK
      runs-on: ubuntu-latest

      steps:
        - name: Checkout code
          uses: actions/checkout@v4

        - name: Set up JDK 17
          uses: actions/setup-java@v4
          with:
            java-version: '17'
            distribution: 'temurin'

        - name: Setup Gradle 8.1.2
          uses: gradle/actions/setup-gradle@v3
          with:
            gradle-version: '8.1.2'

        - name: Decode Keystore
          run: |
            mkdir -p app/keystore
            if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
              echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/keystore/release.jks
            fi

        - name: Build Release APK
          env:
            KEYSTORE_PATH: keystore/release.jks
            KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
            KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
            KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          run: gradle assembleRelease --no-daemon --stacktrace

        - name: Upload Release APK
          uses: actions/upload-artifact@v4
          with:
            name: release-apk-${{ github.run_number }}
            path: app/build/outputs/apk/release/*.apk
            retention-days: 30
  